# nginx reverse proxy – unifies Streamlit, the ifc-lite viewer and the IFC
# static-file server behind the single port that Hugging Face Spaces exposes.

worker_processes 1;
pid        /tmp/nginx.pid;
error_log  /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    client_max_body_size 200M;

    access_log /var/log/nginx/access.log;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 7860;

        # ---------- IFC static files (port 8080 internally) -----------------
        location /static-ifc/ {
            proxy_pass http://127.0.0.1:8080/;
            proxy_http_version 1.1;
        }

        # ---------- ifc-lite 3D viewer (port 3000 internally) ---------------
        location /viewer/ {
            proxy_pass http://127.0.0.1:3000/;
            proxy_http_version 1.1;
        }

        # ---------- Streamlit (port 8501 internally) ------------------------
        location / {
            proxy_pass http://127.0.0.1:8501;
            proxy_http_version 1.1;
            proxy_set_header  Host              $host;
            proxy_set_header  X-Real-IP         $remote_addr;
            proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header  X-Forwarded-Proto $scheme;
            proxy_set_header  Upgrade           $http_upgrade;
            proxy_set_header  Connection        $connection_upgrade;
            proxy_read_timeout 86400;
        }

        # Streamlit websocket endpoint
        location /_stcore/stream {
            proxy_pass http://127.0.0.1:8501/_stcore/stream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host       $host;
            proxy_read_timeout 86400;
        }
    }
}
